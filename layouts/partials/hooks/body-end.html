<div id="auth-overlay">
    <h2>Secure Documentation</h2>
    <input type="password" id="auth-password" placeholder="Enter password to access" />
    <button id="auth-submit">Unlock</button>
</div>

<script>
(function() {
    // Basic Client-Side Auth Overlay
    var authorized = localStorage.getItem('wiki_auth_token');
    if (authorized === 'true') {
        // Authenticated users get the overlay removed and visibility restored
        document.body.style.visibility = 'visible';
        var overlay = document.getElementById('auth-overlay');
        if (overlay) overlay.style.display = 'none';
        return;
    }

    // Secure the visible view
    document.body.style.visibility = 'visible'; 
    var overlay = document.getElementById('auth-overlay');
    
    // Hide all default elements attached to the body excluding our overlay
    Array.from(document.body.children).forEach(function(child) {
        if (child.id !== 'auth-overlay') {
            child.style.display = 'none';
        }
    });

    // Check credentials locally
    document.getElementById('auth-submit').addEventListener('click', function() {
        var pwd = document.getElementById('auth-password').value;
        if (pwd === 'Janvi') {
            // Set browser local storage token state
            localStorage.setItem('wiki_auth_token', 'true');
            // Reload page to re-execute scripts cleanly into standard visibility
            location.reload();
        } else {
            alert('Incorrect password. Access denied.');
        }
    });
    
    // Allow enter key submission
    document.getElementById('auth-password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('auth-submit').click();
        }
    });
})();
</script>
