<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

html {
    background-color: #0f1115;
}

body {
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
}

body.unlocked {
    visibility: visible;
    opacity: 1;
}

#custom-auth-overlay {
    visibility: visible;
    opacity: 1;
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: radial-gradient(circle at center, rgba(30,33,40,0.85) 0%, rgba(15,17,21,1) 100%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999999;
    font-family: 'Inter', sans-serif;
    color: white;
}

.auth-modal {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border-radius: 16px;
    padding: 40px;
    width: 320px;
    text-align: center;
    transform: translateY(-20px);
    animation: auth-slide-down 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes auth-slide-down {
    0% { transform: translateY(-30px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

.auth-modal h2 {
    font-size: 24px;
    font-weight: 600;
    margin-top: 0;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
}

.auth-modal p {
    font-size: 14px;
    color: #9ca3af;
    margin-bottom: 24px;
}

.auth-input-group {
    position: relative;
    margin-bottom: 20px;
}

.auth-input {
    width: 100%;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px 16px;
    border-radius: 8px;
    color: white;
    font-size: 15px;
    outline: none;
    transition: all 0.2s ease;
    text-align: center;
    letter-spacing: 2px;
}

.auth-input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
}

.auth-input::placeholder {
    color: #4b5563;
    letter-spacing: normal;
}

.auth-btn {
    width: 100%;
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
    transition: transform 0.1s ease, box-shadow 0.2s ease;
}

.auth-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 8px -2px rgba(59, 130, 246, 0.4);
}

.auth-btn:active {
    transform: translateY(1px);
    box-shadow: 0 2px 4px -2px rgba(59, 130, 246, 0.4);
}

.auth-error {
    color: #ef4444; 
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
    display: none;
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
}

@keyframes shake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}
</style>

<script>
(function () {
    var secretCode = "sagar";
    
    if (localStorage.getItem('wiki_unlocked') === 'true') {
        document.addEventListener('DOMContentLoaded', function () {
            document.body.classList.add('unlocked');
        });
        return;
    }

    document.addEventListener('DOMContentLoaded', function () {
        var overlay = document.createElement('div');
        overlay.id = 'custom-auth-overlay';
        overlay.innerHTML = `
            <div class="auth-modal">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px;">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <h2>Restricted Area</h2>
                <p>Private Documentation Access.</p>
                <div class="auth-input-group">
                    <input type="password" id="custom-auth-input" class="auth-input" placeholder="•••••" autocomplete="off" />
                </div>
                <button id="custom-auth-btn" class="auth-btn">Unlock Wiki</button>
                <div id="custom-auth-error" class="auth-error">Incorrect credentials</div>
            </div>
        `;
        
        Array.from(document.body.children).forEach(child => child.style.display = 'none');
        document.body.appendChild(overlay);
        document.body.style.visibility = 'visible'; 
        document.body.style.opacity = '1';

        var input = document.getElementById('custom-auth-input');
        var btn = document.getElementById('custom-auth-btn');
        var error = document.getElementById('custom-auth-error');

        function triggerUnlock() {
            if (input.value.toLowerCase() === secretCode) {
                localStorage.setItem('wiki_unlocked', 'true');
                overlay.style.opacity = '0';
                setTimeout(() => location.reload(), 300);
            } else {
                error.style.display = 'block';
                var newError = error.cloneNode(true);
                error.parentNode.replaceChild(newError, error);
                error = newError;
                input.value = "";
                input.focus();
            }
        }

        btn.addEventListener('click', triggerUnlock);
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') triggerUnlock();
        });
        
        setTimeout(() => input.focus(), 100);
    });
})();
</script>
