<style>
    html {
        background-color: #f1f2f6;
    }

    body {
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    body.unlocked {
        visibility: visible;
        opacity: 1;
    }
</style>

<script>
    (function () {
        var secretCode = "sagar";
        
        if (localStorage.getItem('wiki_unlocked') === 'true') {
            document.addEventListener('DOMContentLoaded', function () {
                document.body.classList.add('unlocked');
            });
            return;
        }

        document.addEventListener('DOMContentLoaded', function () {
            // Short delay to allow the blank page style to apply before prompt blocks the thread
            setTimeout(function() {
                var attempt = prompt("🔒 Enter password to access Wiki:");
                if (attempt === secretCode) {
                    localStorage.setItem('wiki_unlocked', 'true');
                    document.body.classList.add('unlocked');
                } else {
                    alert("Incorrect password. Access denied.");
                    // Refresh or remain hidden
                }
            }, 10);
        });
    })();
</script>
